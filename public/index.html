<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentBoard — Painel de Orquestração</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="tela-login">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">⬡</div>
        <h1>AgentBoard</h1>
        <p>Painel de Orquestração de Agentes</p>
      </div>
      <form id="form-login" onsubmit="fazerLogin(event)">
        <div class="campo">
          <label>Usuário</label>
          <input type="text" id="campo-usuario" value="admin" required>
        </div>
        <div class="campo">
          <label>Senha</label>
          <input type="password" id="campo-senha" value="admin123" required>
        </div>
        <div id="erro-login" class="erro-msg" style="display:none"></div>
        <button type="submit" id="btn-login" class="btn-primario">Entrar</button>
      </form>
    </div>
  </div>

  <div id="painel-principal" style="display:none">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon-sm">⬡</span>
        <span>AgentBoard</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item ativo" onclick="navegarPara('dashboard',this)"><span class="nav-icon">▦</span> Dashboard</a>
        <a href="#" class="nav-item" onclick="navegarPara('agentes',this)"><span class="nav-icon">◈</span> Agentes</a>
        <a href="#" class="nav-item" onclick="navegarPara('tarefas',this)"><span class="nav-icon">◇</span> Tarefas</a>
        <a href="#" class="nav-item" onclick="navegarPara('logs',this)"><span class="nav-icon">≡</span> Logs</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sse-status">
          <span class="sse-dot" id="sse-dot"></span>
          <span id="sse-texto">Conectando...</span>
        </div>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>
    </aside>

    <main class="conteudo">
      <section id="pagina-dashboard" class="pagina ativa">
        <div class="cabecalho-pagina">
          <h2>Dashboard</h2>
          <span id="hora-atual" style="color:var(--cor-texto-dim);font-size:13px"></span>
        </div>
        <div class="cards-resumo">
          <div class="card-resumo"><div class="card-numero" id="total-agentes">—</div><div class="card-label">Agentes</div></div>
          <div class="card-resumo verde"><div class="card-numero" id="agentes-ativos">—</div><div class="card-label">Em Execução</div></div>
          <div class="card-resumo azul"><div class="card-numero" id="total-tarefas">—</div><div class="card-label">Tarefas</div></div>
          <div class="card-resumo laranja"><div class="card-numero" id="total-logs">—</div><div class="card-label">Logs</div></div>
        </div>
        <div class="painel-duplo">
          <div class="painel-secao">
            <h3>Agentes Ativos</h3>
            <div id="lista-agentes-dash"></div>
          </div>
          <div class="painel-secao">
            <h3>Logs em Tempo Real</h3>
            <div id="feed-logs" class="feed-logs"></div>
          </div>
        </div>
      </section>

      <section id="pagina-agentes" class="pagina">
        <div class="cabecalho-pagina">
          <h2>Agentes</h2>
          <button class="btn-primario" onclick="abrirModalAgente()">+ Novo Agente</button>
        </div>
        <div id="tabela-agentes"></div>
      </section>

      <section id="pagina-tarefas" class="pagina">
        <div class="cabecalho-pagina">
          <h2>Tarefas</h2>
          <button class="btn-primario" onclick="abrirModalTarefa()">+ Nova Tarefa</button>
        </div>
        <div id="tabela-tarefas"></div>
      </section>

      <section id="pagina-logs" class="pagina">
        <div class="cabecalho-pagina">
          <h2>Logs do Sistema</h2>
        </div>
        <div id="tabela-logs"></div>
      </section>
    </main>
  </div>

  <div id="modal-agente" class="modal" style="display:none">
    <div class="modal-box">
      <h3>Novo Agente</h3>
      <form onsubmit="criarAgente(event)">
        <div class="campo"><label>Nome</label><input type="text" id="inp-nome-agente" required></div>
        <div class="campo"><label>Descrição</label><input type="text" id="inp-desc-agente"></div>
        <div class="modal-acoes">
          <button type="button" class="btn-secundario" onclick="fecharModal('modal-agente')">Cancelar</button>
          <button type="submit" class="btn-primario">Criar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-tarefa" class="modal" style="display:none">
    <div class="modal-box">
      <h3>Nova Tarefa</h3>
      <form onsubmit="criarTarefa(event)">
        <div class="campo"><label>Agente</label><select id="sel-agente-tarefa" required></select></div>
        <div class="campo"><label>Título</label><input type="text" id="inp-titulo-tarefa" required></div>
        <div class="modal-acoes">
          <button type="button" class="btn-secundario" onclick="fecharModal('modal-tarefa')">Cancelar</button>
          <button type="submit" class="btn-primario">Criar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
